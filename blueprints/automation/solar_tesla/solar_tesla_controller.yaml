blueprint:
  name: Solar Tesla Charging — Controller
  description: >
    Ramp-first solar-aware Tesla charging controller. Adjusts the Tesla
    charge current based on measured grid export, prefers ramping over
    stop/start, and is the single source of truth for stop decisions
    (SOC cap, optional hard window-end stop, below-minimum tracking).

    This version delegates the grace-period stop to a separate
    "Grace Stop" companion blueprint via a shared input_boolean
    ("below-minimum" flag). The Controller only toggles the flag; the
    companion runs the timer. This keeps the Controller responsive to
    recovery the moment export climbs back above the minimum.

    Pair with:
      - "Solar Tesla Charging — Grace Stop" (required for session ending)
      - "Solar Tesla Charging — Grid Import Guard" (optional)
  domain: automation
  source_url: https://github.com/andre-sam/solar-tesla-charging/blob/main/blueprints/automation/solar_tesla/solar_tesla_controller.yaml
  input:
    enable_toggle:
      name: Master enable toggle
      description: input_boolean you create to enable/disable solar charging.
      selector:
        entity:
          domain: input_boolean

    below_min_flag:
      name: Below-minimum tracker (input_boolean)
      description: >
        Second input_boolean you create (e.g.
        input_boolean.solar_charging_below_min). The Controller turns
        this ON while export is below the minimum charge current and
        OFF as soon as export recovers or the session ends. The
        companion "Grace Stop" blueprint watches this flag to end the
        session after the grace period.
      selector:
        entity:
          domain: input_boolean

    grid_export_power_negative:
      name: Grid export power sensor (W, negative when exporting)
      description: >
        Signed net or export-only counter. Must be NEGATIVE when
        exporting to the grid. Some meters expose this as a dedicated
        export counter that reports ≤0 W; others expose a signed net
        grid sensor.
      selector:
        entity:
          domain: sensor
          device_class: power

    grid_import_power:
      name: Grid import power sensor (W, positive when importing)
      description: >
        Unidirectional import counter (≥0 W). Combined additively with
        the export sensor so two-counter meters (e.g. Enphase) work
        correctly. If you only have one signed sensor, point both
        inputs at it — the math still works.
      selector:
        entity:
          domain: sensor
          device_class: power

    wall_connector_power:
      name: Wall connector power sensor
      description: Power currently drawn by the charger (W or kW).
      selector:
        entity:
          domain: sensor
          device_class: power

    vehicle_connected:
      name: Vehicle connected binary sensor
      selector:
        entity:
          domain: binary_sensor

    contactor_closed:
      name: Contactor closed binary sensor
      description: On when the charger is actively delivering power.
      selector:
        entity:
          domain: binary_sensor

    wall_connector_status:
      name: Wall connector status sensor
      description: Text status ("Charging", "Connected", "Fault", ...).
      selector:
        entity:
          domain: sensor

    charge_current_number:
      name: Tesla charge current control (A)
      description: number.* entity that sets the Tesla charge current.
      selector:
        entity:
          domain: number

    charge_switch:
      name: Tesla charge on/off switch
      selector:
        entity:
          domain: switch

    battery_soc:
      name: Tesla battery SOC sensor (%)
      selector:
        entity:
          domain: sensor

    charge_limit_number:
      name: Tesla charge limit control (optional)
      description: number.* entity for the Tesla SOC charge limit. Leave
        empty to use only the "Max SOC" value below.
      default: ""
      selector:
        entity:
          domain: number

    wake_button:
      name: Tesla wake-up button (optional)
      description: >
        button.* pressed before starting or resuming charging. Leave
        empty to skip. When provided, it is pressed whenever a restart
        is attempted, including when the car's status is ambiguous
        (unknown/unavailable/asleep), which would otherwise block
        resume.
      default: ""
      selector:
        entity:
          domain: button

    last_guard_trim:
      name: Last Import Guard trim timestamp (optional)
      description: >
        input_datetime (with date + time) updated by the Grid Import
        Guard blueprint each time it trims current. When present, the
        Controller skips the stability delay for ramp-up steps that
        happen within the "fast recovery" window below, so recovery
        from a brief import spike (kettle, microwave) isn't held back
        for a full stability delay. Leave empty to disable.
      default: ""
      selector:
        entity:
          domain: input_datetime

    notify_service:
      name: Notify service (optional)
      description: >
        e.g. notify.mobile_app_phone. Blank disables notifications.
        Used for SOC-cap stops and hard window-end stops. Solar-
        exhaustion stops are notified from the companion Grace Stop
        blueprint.
      default: ""
      selector:
        text:

    line_voltage:
      name: Line voltage (V)
      default: 230
      selector:
        number:
          min: 100
          max: 260
          step: 1
          unit_of_measurement: V

    phase_count:
      name: Number of phases
      description: >
        1, 2 or 3. The grid export sensor must report TOTAL grid power
        across all phases (typical for whole-house meters). If your
        sensor reports per-phase watts, set this to 1.
      default: 3
      selector:
        number:
          min: 1
          max: 3
          step: 1

    export_threshold_amps:
      name: Export buffer (A per line)
      description: Headroom kept between export and charge current.
      default: 1
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
          unit_of_measurement: A

    min_charge_amps:
      name: Minimum charge current (A)
      description: Fleet API supports down to 1 A (~690 W on 3-phase).
        The Tesla app minimum is 5 A.
      default: 1
      selector:
        number:
          min: 1
          max: 16
          step: 1
          unit_of_measurement: A

    max_charge_amps:
      name: Maximum charge current (A)
      default: 16
      selector:
        number:
          min: 6
          max: 48
          step: 1
          unit_of_measurement: A

    restart_hysteresis_amps:
      name: Restart hysteresis (A)
      default: 0.5
      selector:
        number:
          min: 0
          max: 2
          step: 0.1
          unit_of_measurement: A

    max_soc:
      name: Max SOC (%)
      default: 90
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"

    stability_delay_seconds:
      name: Stability delay on ramp-up (s)
      default: 60
      selector:
        number:
          min: 0
          max: 180
          step: 5
          unit_of_measurement: s

    post_trim_fast_recovery_seconds:
      name: Post-trim fast-recovery window (s)
      description: >
        Only used when "Last Import Guard trim timestamp" is set. If a
        ramp-up happens within this many seconds of the last Guard
        trim, the stability delay is skipped so the session recovers
        quickly from a brief import spike.
      default: 180
      selector:
        number:
          min: 0
          max: 600
          step: 30
          unit_of_measurement: s

    hard_stop_at_window_end:
      name: Hard-stop running session at window end
      description: >
        When off (default), a session that started inside the window is
        allowed to run past window_end. When on, the Controller ends
        the session as soon as the window closes.
      default: false
      selector:
        boolean:

    window_start:
      name: Charging window start
      default: "10:00:00"
      selector:
        time:

    window_end:
      name: Charging window end
      default: "14:00:00"
      selector:
        time:

mode: single
max_exceeded: silent

variables:
  enable_toggle: !input enable_toggle
  below_min_flag: !input below_min_flag
  grid_export_power_negative: !input grid_export_power_negative
  grid_import_power: !input grid_import_power
  wall_connector_power: !input wall_connector_power
  vehicle_connected: !input vehicle_connected
  contactor_closed: !input contactor_closed
  wall_connector_status: !input wall_connector_status
  charge_current_number: !input charge_current_number
  charge_switch: !input charge_switch
  battery_soc: !input battery_soc
  charge_limit_number: !input charge_limit_number
  wake_button: !input wake_button
  last_guard_trim: !input last_guard_trim
  notify_service: !input notify_service
  line_voltage: !input line_voltage
  phase_count: !input phase_count
  export_threshold_amps: !input export_threshold_amps
  min_charge_amps_cfg: !input min_charge_amps
  max_charge_amps_cfg: !input max_charge_amps
  restart_hysteresis_amps: !input restart_hysteresis_amps
  max_soc: !input max_soc
  stability_delay_seconds: !input stability_delay_seconds
  post_trim_fast_recovery_seconds: !input post_trim_fast_recovery_seconds
  hard_stop_at_window_end: !input hard_stop_at_window_end
  window_start: !input window_start
  window_end: !input window_end

trigger:
  - platform: homeassistant
    event: start
  - platform: time_pattern
    minutes: "/1"
  - platform: state
    entity_id: !input grid_export_power_negative
  - platform: state
    entity_id: !input grid_import_power
  - platform: state
    entity_id: !input contactor_closed
  - platform: state
    entity_id: !input vehicle_connected
  - platform: state
    entity_id: !input wall_connector_status
  - platform: state
    entity_id: !input battery_soc
  - platform: state
    entity_id: !input wall_connector_power
  - platform: state
    entity_id: !input charge_current_number

condition:
  - condition: state
    entity_id: !input enable_toggle
    state: "on"
  - condition: state
    entity_id: !input vehicle_connected
    state: "on"
  # Sensor health
  - condition: template
    value_template: >
      {% set bad = ['unavailable', 'unknown', 'none', ''] %}
      {{ states(grid_export_power_negative) | lower not in bad
         and states(grid_import_power) | lower not in bad
         and states(wall_connector_power) | lower not in bad
         and states(contactor_closed) | lower not in bad
         and states(battery_soc) | lower not in bad }}

action:
  - variables:
      # Wall connector power → watts
      wall_power_raw: "{{ states(wall_connector_power) | float(0) }}"
      wall_power_unit: "{{ state_attr(wall_connector_power, 'unit_of_measurement') | default('W', true) | lower }}"
      wall_power_w: "{{ (wall_power_raw * 1000) if 'kw' in wall_power_unit else wall_power_raw }}"
      # Effective export (W) adds back the charger's own draw.
      # Net grid = import (≥0) + export_negative (≤0). Negative net = exporting.
      # Flip the sign so grid_export_w is positive when exporting.
      grid_export_w: >
        {{ -((states(grid_import_power) | float(0))
             + (states(grid_export_power_negative) | float(0))) }}
      effective_export_w: "{{ grid_export_w + wall_power_w }}"
      effective_export_a: >
        {{ (effective_export_w / line_voltage) if effective_export_w > 0 else 0 }}
      available_amps: >
        {% set a = (effective_export_a / phase_count) - export_threshold_amps %}
        {{ [[a, 0] | max, max_charge_amps_cfg] | min | round(1) }}
      min_charge_amps: "{{ [min_charge_amps_cfg, 1] | max }}"
      max_charge_amps: >
        {{ [[state_attr(charge_current_number, 'max') | float(max_charge_amps_cfg),
             max_charge_amps_cfg] | min,
            min_charge_amps_cfg] | max }}
      restart_charge_amps: "{{ min_charge_amps + restart_hysteresis_amps }}"
      current_set_amps: "{{ states(charge_current_number) | float(0) }}"
      status_text: "{{ states(wall_connector_status) | lower }}"
      # Blocking statuses that prevent a restart attempt. 'unknown',
      # 'unavailable' and 'asleep' are deliberately NOT blockers — we
      # try to wake the car instead.
      blocking_statuses: "{{ ['fault', 'faulted', 'error', 'offline'] }}"
      soc: "{{ states(battery_soc) | float(0) }}"
      tesla_limit: >
        {% if charge_limit_number %}
          {{ states(charge_limit_number) | float(max_soc) }}
        {% else %}
          {{ max_soc }}
        {% endif %}
      effective_limit: "{{ [max_soc, tesla_limit] | min }}"
      now_time: "{{ now().strftime('%H:%M:%S') }}"
      window_open: "{{ window_start <= now_time < window_end }}"
      flag_on: "{{ is_state(below_min_flag, 'on') }}"
      seconds_since_guard_trim: >
        {% if last_guard_trim %}
          {% set ts = states(last_guard_trim) %}
          {% if ts and ts | lower not in ['unknown', 'unavailable', 'none', ''] %}
            {{ (now() - as_datetime(ts)).total_seconds() }}
          {% else %}
            99999
          {% endif %}
        {% else %}
          99999
        {% endif %}
      guard_trim_recent: "{{ seconds_since_guard_trim | float(99999) < post_trim_fast_recovery_seconds }}"
  - choose:
      # ── Branch 1: SOC cap reached ─────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ is_state(contactor_closed, 'on') and soc >= effective_limit }}
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input charge_switch
          - service: input_boolean.turn_off
            target:
              entity_id: !input below_min_flag
          - if:
              - condition: template
                value_template: "{{ notify_service | length > 0 }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🔋 Tesla Fully Charged (Solar)"
                  message: >
                    Tesla reached {{ soc | round(0) }}% (limit {{ effective_limit | round(0) }}%).
                    Solar charging stopped.

      # ── Branch 2: Hard stop at window end (optional) ──────────────
      - conditions:
          - condition: template
            value_template: >
              {{ hard_stop_at_window_end
                 and is_state(contactor_closed, 'on')
                 and not window_open }}
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input charge_switch
          - service: input_boolean.turn_off
            target:
              entity_id: !input below_min_flag
          - if:
              - condition: template
                value_template: "{{ notify_service | length > 0 }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "⏱️ Solar Window Closed"
                  message: >
                    Charging window ended ({{ window_start }}–{{ window_end }}).
                    Solar session stopped at {{ soc | round(0) }}%.

      # ── Branch 3: Below minimum — hold at min, raise flag ─────────
      # The companion "Grace Stop" blueprint will end the session if
      # this flag stays on for the configured grace period.
      - conditions:
          - condition: template
            value_template: >
              {{ is_state(contactor_closed, 'on')
                 and available_amps < min_charge_amps }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ (current_set_amps | int) != (min_charge_amps | int) }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input charge_current_number
                data:
                  value: "{{ min_charge_amps | round(0) | int }}"
          - if:
              - condition: template
                value_template: "{{ not flag_on }}"
            then:
              - service: input_boolean.turn_on
                target:
                  entity_id: !input below_min_flag

      # ── Branch 4: Recovered from below-minimum — clear flag ──────
      - conditions:
          - condition: template
            value_template: >
              {{ flag_on
                 and (is_state(contactor_closed, 'off')
                      or available_amps >= min_charge_amps) }}
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input below_min_flag

      # ── Branch 5: Start / resume ──────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ is_state(contactor_closed, 'off')
                 and window_open
                 and is_state(vehicle_connected, 'on')
                 and status_text not in blocking_statuses
                 and available_amps >= restart_charge_amps
                 and soc < effective_limit }}
        sequence:
          - variables:
              target_amps: >
                {% set raw = [[available_amps, max_charge_amps] | min, min_charge_amps] | max %}
                {{ raw | round(0, 'floor') | int }}
          # Always try to wake the car on a restart if a wake button is
          # provided — covers the case where status is ambiguous
          # (unknown/unavailable/asleep) after a mid-session sleep.
          - if:
              - condition: template
                value_template: "{{ wake_button | length > 0 }}"
            then:
              - service: button.press
                target:
                  entity_id: !input wake_button
              - delay:
                  seconds: 15
          - service: number.set_value
            target:
              entity_id: !input charge_current_number
            data:
              value: "{{ target_amps }}"
          - delay:
              seconds: 3
          - service: switch.turn_on
            target:
              entity_id: !input charge_switch
          - service: input_boolean.turn_off
            target:
              entity_id: !input below_min_flag

      # ── Branch 6: Adjust while charging ───────────────────────────
      # No window_open check here unless hard_stop_at_window_end is on
      # (Branch 2 handles that case). Branches 1 and 3 take precedence.
      - conditions:
          - condition: template
            value_template: >
              {{ is_state(contactor_closed, 'on')
                 and available_amps >= min_charge_amps
                 and soc < effective_limit }}
        sequence:
          - variables:
              target_amps: >
                {% set current = current_set_amps | int %}
                {% set raw = [[available_amps, max_charge_amps] | min, min_charge_amps] | max | round(0, 'floor') | int %}
                {% if raw > current %}
                  {{ [raw, current + 1] | min }}
                {% else %}
                  {{ raw }}
                {% endif %}
              is_ramp_up: "{{ (target_amps | int) > (current_set_amps | int) }}"
          - if:
              - condition: template
                value_template: "{{ target_amps | int != (current_set_amps | int) }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input charge_current_number
                data:
                  value: "{{ target_amps }}"
              # Skip stability delay during the post-trim fast-recovery
              # window so brief import spikes don't pin us low.
              - if:
                  - condition: template
                    value_template: "{{ is_ramp_up and not guard_trim_recent }}"
                then:
                  - delay:
                      seconds: "{{ stability_delay_seconds }}"
