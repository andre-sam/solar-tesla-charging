blueprint:
  name: Solar Tesla Charging — Plugged-In Notification
  description: >
    Notifies you when the Tesla is plugged in but the solar charging
    master toggle is currently off.
  domain: automation
  source_url: https://github.com/YOUR_USER/solar-tesla-charging/blob/main/blueprints/automation/solar_tesla/solar_tesla_plugged_in_notify.yaml
  input:
    enable_toggle:
      name: Master enable toggle
      selector:
        entity:
          domain: input_boolean

    vehicle_connected:
      name: Vehicle connected binary sensor
      selector:
        entity:
          domain: binary_sensor

    notify_service:
      name: Notify service
      description: e.g. notify.mobile_app_phone
      selector:
        text:

    window_start:
      name: Charging window start
      default: "10:00:00"
      selector:
        time:

    window_end:
      name: Charging window end
      default: "14:00:00"
      selector:
        time:

mode: single

variables:
  window_start: !input window_start
  window_end: !input window_end

trigger:
  - platform: state
    entity_id: !input vehicle_connected
    to: "on"

condition:
  - condition: state
    entity_id: !input enable_toggle
    state: "off"

action:
  - service: !input notify_service
    data:
      title: "🔌 Tesla Plugged In"
      message: >
        Tesla plugged in but solar charging is disabled.
        Window: {{ window_start }}–{{ window_end }}.
