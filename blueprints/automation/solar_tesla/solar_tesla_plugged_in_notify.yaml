blueprint:
  name: Solar Tesla Charging — Plugged-In Notification
  description: >
    Sends a notification on the meaningful plug/toggle lifecycle
    transitions:

      1. The Tesla is plugged in while the solar charging master
         toggle is OFF — reminds you to flip it on.
      2. The Tesla is plugged in while the toggle is already ON —
         confirms solar charging is armed.
      3. The toggle is turned ON while the Tesla is already plugged
         in — confirms solar charging is now armed.
      4. The toggle is turned OFF while a session is running —
         confirms the session was aborted manually.

    NOTE: the charging window (`window_start`/`window_end`) is shown
    in notifications only — it does NOT gate charging here. Point
    these inputs at the SAME input_datetime helpers used by the
    Controller blueprint so the dashboard is the single source of
    truth. The Controller remains the sole gate on when sessions can
    start; this blueprint just reads the same helpers for display.
  domain: automation
  source_url: https://github.com/andre-sam/solar-tesla-charging/blob/main/blueprints/automation/solar_tesla/solar_tesla_plugged_in_notify.yaml
  input:
    enable_toggle:
      name: Master enable toggle
      selector:
        entity:
          domain: input_boolean

    vehicle_connected:
      name: Vehicle connected binary sensor
      selector:
        entity:
          domain: binary_sensor

    contactor_closed:
      name: Contactor closed binary sensor (optional)
      description: >
        Used only to detect "toggle turned off mid-session". Leave
        empty to skip that notification.
      default: ""
      selector:
        entity:
          domain: binary_sensor

    notify_service:
      name: Notify service
      description: e.g. notify.mobile_app_phone
      selector:
        text:

    window_start:
      name: Charging window start (input_datetime)
      description: >
        input_datetime helper (time only) defining when the charging
        window opens. MUST be the same helper used by the Controller
        blueprint so messages reflect the actual control window.
      selector:
        entity:
          domain: input_datetime

    window_end:
      name: Charging window end (input_datetime)
      description: >
        input_datetime helper (time only). MUST match the Controller
        blueprint's window_end.
      selector:
        entity:
          domain: input_datetime

mode: single

variables:
  enable_toggle: !input enable_toggle
  vehicle_connected: !input vehicle_connected
  contactor_closed: !input contactor_closed
  window_start: !input window_start
  window_end: !input window_end

trigger:
  - platform: state
    entity_id: !input vehicle_connected
    to: "on"
    id: plugged_in
  - platform: state
    entity_id: !input enable_toggle
    to: "on"
    id: enabled
  - platform: state
    entity_id: !input enable_toggle
    to: "off"
    id: disabled

action:
  - choose:
      # Plugged in while solar charging is disabled.
      - conditions:
          - condition: trigger
            id: plugged_in
          - condition: state
            entity_id: !input enable_toggle
            state: "off"
        sequence:
          - service: !input notify_service
            data:
              title: "🔌 Tesla Plugged In"
              message: >
                Tesla plugged in but solar charging is disabled.
                Window: {{ states(window_start) }}–{{ states(window_end) }}.

      # Plugged in while solar charging is already enabled.
      - conditions:
          - condition: trigger
            id: plugged_in
          - condition: state
            entity_id: !input enable_toggle
            state: "on"
        sequence:
          - service: !input notify_service
            data:
              title: "☀️ Solar Charging Armed"
              message: >
                Tesla plugged in; solar charging will run during the
                window ({{ states(window_start) }}–{{ states(window_end) }}).

      # Toggle enabled while the car is already plugged in.
      - conditions:
          - condition: trigger
            id: enabled
          - condition: state
            entity_id: !input vehicle_connected
            state: "on"
        sequence:
          - service: !input notify_service
            data:
              title: "☀️ Solar Charging Enabled"
              message: >
                Solar charging enabled with Tesla already plugged in.
                Window: {{ states(window_start) }}–{{ states(window_end) }}.

      # Toggle disabled while a session is actively running.
      - conditions:
          - condition: trigger
            id: disabled
          - condition: template
            value_template: "{{ contactor_closed | length > 0 }}"
          - condition: state
            entity_id: !input contactor_closed
            state: "on"
        sequence:
          - service: !input notify_service
            data:
              title: "⏹️ Solar Charging Disabled"
              message: >
                Solar charging disabled while a session was running —
                the Controller will stop the charger on its next
                evaluation.
